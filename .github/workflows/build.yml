name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32c3

      - name: Build filesystem
        run: pio run -t buildfs -e esp32c3

      - name: Prepare artifacts (dev)
        if: github.ref == 'refs/heads/main'
        run: |
          BUILD=.pio/build/esp32c3
          cp $BUILD/firmware.bin   $BUILD/firmware-dev.bin
          cp $BUILD/littlefs.bin   $BUILD/filesystem-dev.bin
          cp $BUILD/littlefs.bin   $BUILD/filesystem.bin
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin $BUILD/boot_app0.bin

      - name: Prepare artifacts (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          BUILD=.pio/build/esp32c3
          cp $BUILD/firmware.bin   $BUILD/firmware-${{ github.ref_name }}.bin
          cp $BUILD/littlefs.bin   $BUILD/filesystem-${{ github.ref_name }}.bin
          cp $BUILD/littlefs.bin   $BUILD/filesystem.bin
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin $BUILD/boot_app0.bin

      - name: Dev release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev build
          prerelease: true
          make_latest: false
          files: |
            .pio/build/esp32c3/firmware-dev.bin
            .pio/build/esp32c3/filesystem-dev.bin
            .pio/build/esp32c3/firmware.bin
            .pio/build/esp32c3/filesystem.bin
            .pio/build/esp32c3/bootloader.bin
            .pio/build/esp32c3/partitions.bin
            .pio/build/esp32c3/boot_app0.bin

      - name: Stable release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            .pio/build/esp32c3/firmware-${{ github.ref_name }}.bin
            .pio/build/esp32c3/filesystem-${{ github.ref_name }}.bin
            .pio/build/esp32c3/firmware.bin
            .pio/build/esp32c3/filesystem.bin
            .pio/build/esp32c3/bootloader.bin
            .pio/build/esp32c3/partitions.bin
            .pio/build/esp32c3/boot_app0.bin

      - name: Build GitHub Pages
        run: |
          mkdir -p docs
          BUILD=.pio/build/esp32c3
          cp $BUILD/bootloader.bin docs/bootloader.bin
          cp $BUILD/partitions.bin docs/partitions.bin
          cp $BUILD/boot_app0.bin  docs/boot_app0.bin
          cp $BUILD/firmware.bin   docs/firmware.bin
          cp $BUILD/filesystem.bin docs/filesystem.bin
          cp installer/index.html  docs/index.html
          VERSION="${{ github.ref_name }}"
          cat > docs/manifest.json << EOF
          {
            "name": "ESP32-C3 Semaphore",
            "version": "${VERSION#v}",
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  { "path": "bootloader.bin", "offset": 0 },
                  { "path": "partitions.bin",  "offset": 32768 },
                  { "path": "boot_app0.bin",   "offset": 57344 },
                  { "path": "firmware.bin",    "offset": 65536 },
                  { "path": "filesystem.bin",  "offset": 2686976 }
                ]
              }
            ]
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
