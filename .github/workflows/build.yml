name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32c3

      - name: Build filesystem
        run: pio run -t buildfs -e esp32c3

      - name: Prepare artifacts (dev)
        if: github.ref == 'refs/heads/main'
        run: |
          cp .pio/build/esp32c3/firmware.bin   .pio/build/esp32c3/firmware-dev.bin
          cp .pio/build/esp32c3/littlefs.bin   .pio/build/esp32c3/filesystem-dev.bin
          cp .pio/build/esp32c3/littlefs.bin   .pio/build/esp32c3/filesystem.bin

      - name: Prepare artifacts (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp .pio/build/esp32c3/firmware.bin   .pio/build/esp32c3/firmware-${{ github.ref_name }}.bin
          cp .pio/build/esp32c3/littlefs.bin   .pio/build/esp32c3/filesystem-${{ github.ref_name }}.bin
          cp .pio/build/esp32c3/littlefs.bin   .pio/build/esp32c3/filesystem.bin

      - name: Dev release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev build
          prerelease: true
          make_latest: false
          files: |
            .pio/build/esp32c3/firmware-dev.bin
            .pio/build/esp32c3/filesystem-dev.bin
            .pio/build/esp32c3/firmware.bin
            .pio/build/esp32c3/filesystem.bin

      - name: Stable release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            .pio/build/esp32c3/firmware-${{ github.ref_name }}.bin
            .pio/build/esp32c3/filesystem-${{ github.ref_name }}.bin
            .pio/build/esp32c3/firmware.bin
            .pio/build/esp32c3/filesystem.bin
