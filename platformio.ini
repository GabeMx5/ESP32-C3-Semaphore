[platformio]
default_envs = esp32c3

; Settings shared across all environments
[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
extra_scripts = pre:compress_web.py
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D FASTLED_RMT_BUILTIN_DRIVER=1
lib_deps =
    olikraus/U8g2
    bblanchon/ArduinoJson
    adafruit/Adafruit NeoPixel@^1.10.6
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
    knolleary/PubSubClient@^2.8
    Aircoookie/Espalexa@^2.7.0

; Development: upload via USB, no Improv wizard
[env:esp32c3]
#upload_protocol = espota
#upload_port = 192.168.1.203

; Web installer release: includes Improv Wi-Fi first-boot wizard
[env:esp32c3_installer]
build_flags =
    ${env.build_flags}
    -D IMPROV_ENABLED
lib_deps =
    ${env.lib_deps}
    https://github.com/jnthas/Improv-WiFi-Library.git
